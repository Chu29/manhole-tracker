name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/12 * * * *" # Every 12 minutes (UTC)
  workflow_dispatch: # Allows manual execution

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error \
          https://manhole-tracker-backend.onrender.com/api/health
